server:
  port: 8090

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tiket-order-service
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:/db/migration
    baseline-on-migrate: true


eureka:
  client:
    service-url:
      defaultzone: http://localhost:8761/eureka
